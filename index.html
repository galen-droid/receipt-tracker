<style>

.fullscreen-img { max-width: 100%; max-height: 90vh; object-fit: contain; border-radius: 0.5rem; }

.ocr-text { font-size: 0.7rem; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 0.75rem; max-height: 8rem; overflow: auto; white-space: pre-wrap; color: #6b7280; font-family: monospace; margin-bottom: 0.75rem; }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }

.history-list { display: flex; flex-direction: column; gap: 0.5rem; max-height: 13rem; overflow-y: auto; }
.history-item { display: flex; align-items: center; justify-content: space-between; background: #f9fafb; border-radius: 0.75rem; padding: 0.625rem 1rem; font-size: 0.875rem; }

.month-badge { font-size: 0.75rem; background: #e0e7ff; color: #4338ca; padding: 0.125rem 0.5rem; border-radius: 9999px; }

.settings-label { display: block; font-size: 0.8125rem; font-weight: 500; color: #374151; }
.settings-input { width: 100%; border: 1px solid #d1d5db; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem; margin-top: 0.25rem; outline: none; }

.centered { text-align: center; }
.centered-padded { text-align: center; padding: 2rem 0; }

.loading-row { display: flex; align-items: center; justify-content: center; padding: 1.5rem; gap: 0.75rem; }

.text-muted { color: #6b7280; }
.text-sm { font-size: 0.875rem; }
.text-xs { font-size: 0.8125rem; }
.text-success { color: #15803d; font-weight: 600; }
.hidden { display: none; }

.version-label { text-align: center; font-size: 0.7rem; color: #9ca3af; margin: 0.75rem 0 0.5rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 1.25rem; height: 1.25rem; border: 2px solid #2563eb; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ── Constants ──────────────────────────────────────────────────────────── */

var DEFAULT_CLIENT_ID = "186804789210-t6r2g6had74t7ven14nlt1pi7hl14onr.apps.googleusercontent.com";
var DEFAULT_FOLDER_ID = "1IX1tvkckzHuyLx4OWK26RtpF_qAyyV9o";
var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
var CURRENCY_CODES = ["CAD","USD","EUR","GBP","AUD","NZD","JPY","CNY","HKD","SGD","CHF","SEK","NOK","DKK","INR","KRW","THB","MXN","BRL","ZAR"];
var CATEGORIES = ["Food","Travel","Hotel","Entertainment","Other"];
var SHEET_HEADERS = ["Staff","Date","Merchant","Category","Description","Total","Currency","Payment","Drive URL","Logged At"];
var CURRENCY_OPTIONS = ["","CAD","USD","EUR","GBP","AUD","JPY","CHF","Other"];
var TOKEN_WARN_MS = 10 * 60 * 1000;

var APP_VERSION = "0.5.0";
var EMPTY_FORM = {staff:"",date:"",merchant:"",category:"Food",description:"",total:"",currency:"",payment:""};

/* ── Utility Functions ──────────────────────────────────────────────────── */

function extractId(value) {
  if (!value) return "";
  var match = value.match(/folders\/([a-zA-Z0-9_-]+)/);
  if (match) return match[1];
  match = value.match(/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (match) return match[1];
  return value.trim();
}

function getMonthLabel(dateString) {
  var d;
  if (dateString && dateString.match(/^\d{4}-\d{2}/)) {
    var parts = dateString.split("-");
    d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, 1);
  } else {
    d = new Date();
  }
  return MONTHS[d.getMonth()] + " " + d.getFullYear();
}

function fileToBase64(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() { resolve(reader.result); };
    reader.onerror = function() { reject(new Error("Failed to read file")); };
    reader.readAsDataURL(file);
  });
}

function resizeImage(dataUrl, maxDimension) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      var scale = maxDimension / Math.max(w, h);
      if (scale < 1) { w = Math.round(w * scale); h = Math.round(h * scale); }
      var canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", 0.85));
    };
    img.src = dataUrl;
  });
}

function mergeForm(prev, updates) {
  var out = {};
  for (var k in prev) out[k] = prev[k];
  for (var k2 in updates) out[k2] = updates[k2];
  return out;
}

/* ── Receipt Parsing ────────────────────────────────────────────────────── */

var MERCHANT_NOISE = [
  "receipt","cardholder","copy","tax invoice","terminal","duplicate",
  "server","cashier","transaction","order","table","guest","station","ticket","dine"
];
var MONTH_MAP = {jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};

function extractMerchant(lines) {
  for (var i = 0; i < Math.min(lines.length, 6); i++) {
    var line = lines[i].replace(/[*#=]+/g, "").trim();
    if (line.length < 2) continue;
    var skip = false;
    for (var j = 0; j < MERCHANT_NOISE.length; j++) {
      if (line.toLowerCase().indexOf(MERCHANT_NOISE[j]) >= 0) { skip = true; break; }
    }
    if (skip) continue;
    if (line.match(/^[\d\-\/\.\:\s]+$/)) continue;
    if (line.match(/^(tel|phone|fax|www|http|abn|gst|mid|aid|tid)/i)) continue;
    if (line.match(/^\(?\d{3}\)?[\s\-]?\d{3}[\s\-]?\d{4}$/)) continue;
    if (line.match(/\d{1,2}:\d{2}(:\d{2})?\s*(AM|PM|A|P)\b/i)) continue;
    return line;
  }
  return "";
}

function extractDate(lines) {
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var m;
    m = line.match(/(\d{4})[\-\/\.](\d{1,2})[\-\/\.](\d{1,2})/);
    if (m) return m[1] + "-" + ("0" + m[2]).slice(-2) + "-" + ("0" + m[3]).slice(-2);

    m = line.match(/(\d{1,2})[\-\s]+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*[\-\s,]+(\d{4})/i);
    if (m) return m[3] + "-" + MONTH_MAP[m[2].substring(0,3).toLowerCase()] + "-" + ("0" + m[1]).slice(-2);

    m = line.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*[\s\-]+(\d{1,2})[\s,\-]+(\d{4})/i);
    if (m) return m[3] + "-" + MONTH_MAP[m[1].substring(0,3).toLowerCase()] + "-" + ("0" + m[2]).slice(-2);

    m = line.match(/(\d{1,2})[\-\/](\d{1,2})[\-\/](\d{4})/);
    if (m) {
      var a = parseInt(m[1]), b = parseInt(m[2]);
      if (a > 12) return m[3] + "-" + ("0" + b).slice(-2) + "-" + ("0" + a).slice(-2);
      return m[3] + "-" + ("0" + a).slice(-2) + "-" + ("0" + b).slice(-2);
    }

    m = line.match(/(\d{1,2})\/(\d{1,2})\/(\d{2})(?!\d)/);
    if (m) {
      var y = "20" + m[3];
      a = parseInt(m[1]); b = parseInt(m[2]);
      if (a > 12) return y + "-" + ("0" + b).slice(-2) + "-" + ("0" + a).slice(-2);
      return y + "-" + ("0" + a).slice(-2) + "-" + ("0" + b).slice(-2);
    }
  }
  return "";
}

function extractTotal(text) {
  var chargedPatterns = [
    /credit\s*card\s*(?:sale|charge|payment)[\s:]*\$?\s*([\d,]+\.\d{2})/gi,
    /(?:amount|amt)\s*(?:due|charged|paid)[\s:]*\$?\s*([\d,]+\.\d{2})/gi,
    /balance\s*due[\s:]*\$?\s*([\d,]+\.\d{2})/gi
  ];
  var charged = [];
  for (var i = 0; i < chargedPatterns.length; i++) {
    var re = chargedPatterns[i];
    var match;
    while ((match = re.exec(text)) !== null) {
      var val = parseFloat(match[1].replace(/,/g, ""));
      if (!isNaN(val) && val > 0) charged.push(val);
    }
  }
  if (charged.length > 0) return Math.max.apply(null, charged).toFixed(2);

  var totalPatterns = [
    /grand\s*total[\s:]*\$?\s*(?:CAD|USD|EUR|GBP)?\s*([\d,]+\.\d{2})/gi,
    /\btotal[\s:]*\$?\s*(?:CAD|USD|EUR|GBP)?\s*([\d,]+\.\d{2})/gi
  ];
  var totals = [];
  for (var i = 0; i < totalPatterns.length; i++) {
    var re = totalPatterns[i];
    var match;
    while ((match = re.exec(text)) !== null) {
      var val = parseFloat(match[1].replace(/,/g, ""));
      if (!isNaN(val) && val > 0) totals.push(val);
    }
  }
  var subRe = /sub\s*-?\s*total[\s:]*\$?\s*([\d,]+\.\d{2})/gi;
  var subtotals = [];
  var sm;
  while ((sm = subRe.exec(text)) !== null) {
    subtotals.push(parseFloat(sm[1].replace(/,/g, "")));
  }
  var filtered = totals.filter(function(t) {
    for (var j = 0; j < subtotals.length; j++) {
      if (Math.abs(t - subtotals[j]) < 0.01) return false;
    }
    return true;
  });

  var tipRe = /(?:\btip\b|\bgratuity\b)[\s:]*\$?\s*([\d,]+\.\d{2})/gi;
  var tipAmount = 0;
  var tm;
  while ((tm = tipRe.exec(text)) !== null) {
    var tv = parseFloat(tm[1].replace(/,/g, ""));
    if (!isNaN(tv) && tv > 0) tipAmount = Math.max(tipAmount, tv);
  }

  var baseTotal = 0;
  if (filtered.length > 0) {
    baseTotal = Math.max.apply(null, filtered);
  } else if (totals.length > 0) {
    baseTotal = Math.max.apply(null, totals);
  }

  if (baseTotal > 0 && tipAmount > 0) {
    var alreadyIncludesTip = false;
    var pool = filtered.length > 0 ? filtered : totals;
    for (var k = 0; k < pool.length; k++) {
      if (Math.abs(pool[k] + tipAmount - baseTotal) < 0.05) {
        alreadyIncludesTip = true;
        break;
      }
    }
    if (!alreadyIncludesTip) return (baseTotal + tipAmount).toFixed(2);
  }
  if (baseTotal > 0) return baseTotal.toFixed(2);
  return "";
}

function extractCurrency(text) {
  var upper = text.toUpperCase();
  for (var i = 0; i < CURRENCY_CODES.length; i++) {
    if (upper.indexOf(CURRENCY_CODES[i]) >= 0) return CURRENCY_CODES[i];
  }
  if (text.indexOf("$") >= 0) return "USD";
  return "";
}

function extractPayment(lines, text) {
  var cardPatterns = [
    /visa\s*(?:prepaid\s*)?(?:\S*?)(\d{4})/i,
    /mastercard\s*(?:\S*?)(\d{4})/i,
    /amex\s*(?:\S*?)(\d{4})/i,
    /x{4,}(\d{4})/i,
    /\*{4,}(\d{4})/i
  ];
  for (var i = 0; i < lines.length; i++) {
    for (var j = 0; j < cardPatterns.length; j++) {
      var match = lines[i].match(cardPatterns[j]);
      if (match) {
        var type = "Card";
        if (lines[i].match(/visa/i)) type = "Visa";
        else if (lines[i].match(/master/i)) type = "Mastercard";
        else if (lines[i].match(/amex/i)) type = "Amex";
        return type + " ****" + match[1];
      }
    }
  }
  if (text.match(/\bcash\b/i) && !text.match(/cash\s*back/i)) return "Cash";
  if (text.match(/\bdebit\b/i)) return "Debit";
  return "";
}

function extractCategory(text) {
  var lower = text.toLowerCase();
  if (lower.match(/hotel|inn|suite|resort|motel|lodge|airbnb/)) return "Hotel";
  if (lower.match(/uber|lyft|taxi|airline|flight|airport|parking|fuel|petrol/)) return "Travel";
  if (lower.match(/cinema|movie|theatre|theater|concert|museum|gallery/)) return "Entertainment";
  return "Food";
}

function extractDescription(lines) {
  var noise = /total|subtotal|sub total|tax|balance|change|tendered|visa|master|debit|credit|payment|cash|gratuity|tip|method|contactless|chip|pin|auth|ref|clover|cardholder|signature|retain|copy|ticket|order|table|guest|server|cashier|station|transaction|gst|pst|hst/i;
  var items = [];
  for (var i = 0; i < lines.length; i++) {
    if (!lines[i].match(/\d+\.\d{2}/)) continue;
    if (noise.test(lines[i])) continue;
    var cleaned = lines[i].replace(/\$?\s*[\d,]+\.\d{2}\s*$/, "").trim().replace(/^\d+\s*[xX]?\s+/, "").trim();
    if (cleaned.length > 1 && cleaned.length < 60 && !cleaned.match(/^[\d\s\.\-\*]+$/)) {
      items.push(cleaned);
    }
  }
  return items.slice(0, 5).join(", ");
}

function parseReceipt(text, staffName) {
  var lines = text.split("\n").map(function(l) { return l.trim(); }).filter(Boolean);
  return {
    staff: staffName,
    merchant: extractMerchant(lines),
    date: extractDate(lines),
    total: extractTotal(text),
    currency: extractCurrency(text),
    payment: extractPayment(lines, text),
    category: extractCategory(text),
    description: extractDescription(lines)
  };
}

/* ── API Functions ──────────────────────────────────────────────────────── */

function visionOCR(token, base64, isPdf) {
  var url = isPdf
    ? "https://vision.googleapis.com/v1/files:annotate"
    : "https://vision.googleapis.com/v1/images:annotate";
  var requestBody;
  if (isPdf) {
    requestBody = {requests: [{
      inputConfig: {content: base64, mimeType: "application/pdf"},
      features: [{type: "DOCUMENT_TEXT_DETECTION"}]
    }]};
  } else {
    requestBody = {requests: [{
      image: {content: base64},
      features: [{type: "TEXT_DETECTION", maxResults: 1}]
    }]};
  }
  return fetch(url + "?access_token=" + encodeURIComponent(token), {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(requestBody)
  })
  .then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error("Vision: " + t.substring(0, 200)); });
    return r.json();
  })
  .then(function(data) {
    if (isPdf) {
      var fileResp = data.responses && data.responses[0];
      if (fileResp && fileResp.error) throw new Error("Vision: " + fileResp.error.message);
      var pages = fileResp && fileResp.responses;
      if (!pages || pages.length === 0) return "";
      var allText = [];
      for (var i = 0; i < pages.length; i++) {
        if (pages[i].fullTextAnnotation) allText.push(pages[i].fullTextAnnotation.text);
        else if (pages[i].textAnnotations && pages[i].textAnnotations[0]) allText.push(pages[i].textAnnotations[0].description);
      }
      return allText.join("\n");
    }
    var resp = data.responses && data.responses[0];
    if (resp && resp.error) throw new Error("Vision: " + resp.error.message);
    if (resp && resp.fullTextAnnotation) return resp.fullTextAnnotation.text;
    if (resp && resp.textAnnotations && resp.textAnnotations[0]) return resp.textAnnotations[0].description;
    return "";
  });
}

function getUserInfo(token) {
  return fetch("https://www.googleapis.com/oauth2/v2/userinfo", {
    headers: {Authorization: "Bearer " + token}
  })
  .then(function(r) {
    if (!r.ok) throw new Error("Failed to get user info");
    return r.json();
  })
  .then(function(data) { return data.name || data.email || ""; })
  .catch(function() { return ""; });
}

function findOrCreateFolder(token, name, parentId) {
  var query = "name='" + name + "' and '" + parentId + "' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false";
  return fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent(query) + "&fields=files(id)", {
    headers: {Authorization: "Bearer " + token}
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.files && data.files.length > 0) return data.files[0].id;
    return fetch("https://www.googleapis.com/drive/v3/files", {
      method: "POST",
      headers: {Authorization: "Bearer " + token, "Content-Type": "application/json"},
      body: JSON.stringify({name: name, mimeType: "application/vnd.google-apps.folder", parents: [parentId]})
    })
    .then(function(r) { return r.json(); })
    .then(function(d) { return d.id; });
  });
}

function findOrCreateSpreadsheet(token, name, parentFolderId) {
  var query = "mimeType='application/vnd.google-apps.spreadsheet' and '" + parentFolderId + "' in parents and trashed=false";
  return fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent(query) + "&fields=files(id)", {
    headers: {Authorization: "Bearer " + token}
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.files && data.files.length > 0) return data.files[0].id;
    return fetch("https://www.googleapis.com/drive/v3/files", {
      method: "POST",
      headers: {Authorization: "Bearer " + token, "Content-Type": "application/json"},
      body: JSON.stringify({name: name, mimeType: "application/vnd.google-apps.spreadsheet", parents: [parentFolderId]})
    })
    .then(function(r) { return r.json(); })
    .then(function(created) {
      return fetch("https://sheets.googleapis.com/v4/spreadsheets/" + created.id + "/values/Sheet1!A1:J1?valueInputOption=USER_ENTERED", {
        method: "PUT",
        headers: {Authorization: "Bearer " + token, "Content-Type": "application/json"},
        body: JSON.stringify({values: [SHEET_HEADERS]})
      })
      .then(function() { return created.id; });
    });
  });
}

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false };
  }
  static getDerivedStateFromError() {
    return { hasError: true };
  }
  render() {
    if (this.state.hasError) {
      return (
        <div className="centered-padded">
          <div style={{fontSize:"3rem",marginBottom:"0.5rem"}}>⚠️</div>
          <h2 style={{fontSize:"1.25rem",fontWeight:700}}>Something went wrong</h2>

          <button className="btn-primary" onClick={function(){window.location.reload();}}>Reload</button>
        </div>
      );
    }
    return this.props.children;
  }
}

/* ── App (Orchestrator) ─────────────────────────────────────────────────── */

function App() {
  var [config, setConfig] = React.useState({clientId: DEFAULT_CLIENT_ID, folderId: DEFAULT_FOLDER_ID});
  var [staff, setStaff] = React.useState("");
  var [token, setToken] = React.useState(null);
  var [tokenExpiry, setTokenExpiry] = React.useState(null);
  var [tokenWarning, setTokenWarning] = React.useState("");
  var [step, setStep] = React.useState("loading");
  var [file, setFile] = React.useState(null);
  var [preview, setPreview] = React.useState(null);
  var [fullPreview, setFullPreview] = React.useState(null);
  var [formData, setFormData] = React.useState({...EMPTY_FORM});
  var [status, setStatus] = React.useState("");
  var [busy, setBusy] = React.useState(false);
  var [history, setHistory] = React.useState([]);
  var [ocrText, setOcrText] = React.useState("");
  var [showSettings, setShowSettings] = React.useState(false);

  React.useEffect(function() {
    if (window.location.hash.indexOf("access_token") >= 0) {
      var params = new URLSearchParams(window.location.hash.substring(1));
      var accessToken = params.get("access_token");
      var expiresIn = parseInt(params.get("expires_in")) || 3600;
      window.history.replaceState(null, "", window.location.pathname);
      setToken(accessToken);
      setTokenExpiry(Date.now() + expiresIn * 1000);
      setStatus("Signing in...");
      getUserInfo(accessToken).then(function(name) {
        setStaff(name);
        setFormData(function(prev) { return mergeForm(prev, {staff: name}); });
        setStatus("Welcome, " + name + "!");
        setStep("capture");
      });
    } else {
      setStep("signin");
    }
  }, []);

  React.useEffect(function() {
    if (!tokenExpiry) return;
    var interval = setInterval(function() {
      var remaining = tokenExpiry - Date.now();
      if (remaining <= 0) {
        setTokenWarning("Session expired — please sign in again");
        clearInterval(interval);
      } else if (remaining <= TOKEN_WARN_MS) {
        var mins = Math.ceil(remaining / 60000);
        setTokenWarning("Session expires in " + mins + " min — save your work");
      }
    }, 30000);
    return function() { clearInterval(interval); };
  }, [tokenExpiry]);

  function authenticate() {
    var redirect = window.location.origin + window.location.pathname;
    var scopes = "https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/cloud-vision https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email";
    window.location.href = "https://accounts.google.com/o/oauth2/v2/auth?client_id=" + encodeURIComponent(config.clientId) + "&redirect_uri=" + encodeURIComponent(redirect) + "&response_type=token&scope=" + encodeURIComponent(scopes) + "&prompt=consent";
  }

  function updateField(key, value) {
    setFormData(function(prev) { return mergeForm(prev, {[key]: value}); });
  }

  function handleFile(f) {
    if (!token) { authenticate(); return; }
    setFile(f);
    setOcrText("");
    setBusy(true);
    setStep("review");
    setStatus("Preparing...");
    var isPdf = f.type === "application/pdf";

    fileToBase64(f).then(function(dataUrl) {
      if (!isPdf) {
        setFullPreview(dataUrl);
        return resizeImage(dataUrl, 1024).then(function(resized) {
          setPreview(resized);
          return resized.split(",")[1];
        });
      } else {
        setPreview(null);
        setFullPreview(null);
        return dataUrl.split(",")[1];
      }
    })
    .then(function(base64) {
      setStatus("Reading receipt...");
      return visionOCR(token, base64, isPdf);
    })
    .then(function(rawText) {
      setOcrText(rawText);
      if (!rawText) {
        setStatus("No text found.");
        setFormData(mergeForm(EMPTY_FORM, {staff: staff, date: new Date().toISOString().split("T")[0]}));
      } else {
        var parsed = parseReceipt(rawText, staff);
        setFormData(parsed);
        setStatus("Receipt analyzed!");
      }
      setBusy(false);
    })
    .catch(function(err) {
      setStatus("Error: " + err.message);
      setFormData(mergeForm(EMPTY_FORM, {staff: staff, date: new Date().toISOString().split("T")[0]}));
      setBusy(false);
    });
  }

  function save() {
    if (!file || !formData.total) return;
    if (!token) { authenticate(); return; }
    setBusy(true);
    var monthLabel = getMonthLabel(formData.date);
    setStatus("Creating folders...");

    var savedStaffFolderId;

    findOrCreateFolder(token, monthLabel, config.folderId)
    .then(function(monthFolderId) {
      return findOrCreateFolder(token, formData.staff || "Unknown", monthFolderId);
    })
    .then(function(staffFolderId) {
      savedStaffFolderId = staffFolderId;
      setStatus("Uploading...");
      var ext = file.type === "application/pdf" ? "pdf" : "jpg";
      var safeName = (formData.merchant || "receipt").replace(/[^a-zA-Z0-9 ]/g, "").substring(0, 30).trim().replace(/\s+/g, "_");
      var metadata = {name: safeName + "_" + (formData.date || "unknown") + "_" + Date.now() + "." + ext, parents: [staffFolderId]};
      var form = new FormData();
      form.append("metadata", new Blob([JSON.stringify(metadata)], {type: "application/json"}));
      form.append("file", file);
      return fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink", {
        method: "POST",
        headers: {Authorization: "Bearer " + token},
        body: form
      });
    })
    .then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
      return r.json();
    })
    .then(function(driveFile) {
      var url = driveFile.webViewLink || "https://drive.google.com/file/d/" + driveFile.id + "/view";
      setStatus("Logging...");
      var staffName = formData.staff || "Unknown";
      return findOrCreateSpreadsheet(token, staffName + " \u2013 " + monthLabel, savedStaffFolderId)
      .then(function(sheetId) {
        var row = [formData.staff, formData.date, formData.merchant, formData.category, formData.description, formData.total, formData.currency, formData.payment, url, new Date().toISOString()];
        return fetch("https://sheets.googleapis.com/v4/spreadsheets/" + sheetId + "/values/Sheet1!A:J:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS", {
          method: "POST",
          headers: {Authorization: "Bearer " + token, "Content-Type": "application/json"},
          body: JSON.stringify({values: [row]})
        });
      })
      .then(function(r) {
        if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
        var entry = mergeForm(formData, {driveUrl: url, monthLabel: monthLabel});
        setHistory(function(prev) { return prev.concat([entry]); });
        setStatus("Done!");
        setStep("done");
        setBusy(false);
      });
    })
    .catch(function(err) {
      setStatus("Error: " + err.message);
      setBusy(false);
    });
  }

  function reset() {
    setFile(null);
    setPreview(null);
    setFullPreview(null);
    setOcrText("");
    setFormData(mergeForm(EMPTY_FORM, {staff: staff}));
    setStatus("");
    setStep("capture");
  }

  function handleSettingsSave(newConfig) {
    setConfig(newConfig);
    setToken(null);
    setTokenExpiry(null);
    setTokenWarning("");
    setShowSettings(false);
    setStep("signin");
    setStatus("Settings saved.");
  }

  return (
    <div className="page">
      {showSettings && (
        <SettingsModal
          config={config}
          onSave={handleSettingsSave}
          onClose={function() { setShowSettings(false); }}
        />
      )}

      <div className="card">
        <div className="card-header">
          <div className="card-header-row">
            <div className="card-title">
              <span style={{fontSize:"1.5rem"}}>🧾</span>
              <strong style={{fontSize:"1.125rem"}}>Receipt Tracker</strong>
            </div>
            <button className="btn-settings" onClick={function() { setShowSettings(true); }} aria-label="Open settings">
              Settings
            </button>
          </div>
          {status && <p className="status-text">{status}</p>}
          {tokenWarning && <p className="token-warning">{tokenWarning}</p>}
        </div>

        <div className="card-body">
          {step === "loading" && (
            <div className="loading-center">
              <div className="spinner"></div>
              <span className="text-muted">Loading...</span>
            </div>
          )}

          {step === "signin" && <SignInScreen onAuth={authenticate} />}

          {step === "capture" && (
            <CaptureScreen
              staff={staff}
              onFile={handleFile}
              onSignOut={function() { setToken(null); setStaff(""); setTokenExpiry(null); setTokenWarning(""); setStep("signin"); setStatus(""); }}
              history={history}
            />
          )}

          {step === "review" && (
            <ReviewForm
              formData={formData}
              onUpdate={updateField}
              preview={preview}
              fullPreview={fullPreview}
              file={file}
              ocrText={ocrText}
              busy={busy}
              onSave={save}
              onCancel={reset}
            />
          )}

          {step === "done" && <DoneScreen formData={formData} onReset={reset} />}
        </div>
      </div>
      <p className="version-label">v{APP_VERSION} beta</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
